# Local production-mode pilot — runs on Docker Desktop without a VM or domain.
# Isolated from dev compose (separate project + volumes). App: http://localhost:8080
#
#   cp .env.production.example .env.production
#   docker compose -f docker-compose.local-pilot.yml --env-file .env.production up -d --build

name: verdin-pilot

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - '8025:8025'
      - '1025:1025'

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: production
    env_file: .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      mailpit:
        condition: service_started
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/ready')",
        ]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 90s

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file: .env.production
    depends_on:
      api:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: production
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_ENABLE_AI: ${VITE_ENABLE_AI:-false}
        VITE_ENABLE_LLM: ${VITE_ENABLE_LLM:-false}
        VITE_ENABLE_IMPORTS: ${VITE_ENABLE_IMPORTS:-true}
        VITE_ENABLE_ENTERPRISE: ${VITE_ENABLE_ENTERPRISE:-false}
        VITE_ENABLE_CLIENT_PORTAL: ${VITE_ENABLE_CLIENT_PORTAL:-false}
        VITE_ENABLE_CLIENT_ENROLLMENT: ${VITE_ENABLE_CLIENT_ENROLLMENT:-false}
        VITE_ENABLE_PORTAL_PUSH: ${VITE_ENABLE_PORTAL_PUSH:-false}
    depends_on:
      api:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - '${HTTP_PORT:-8080}:80'
    volumes:
      - ./infrastructure/nginx/production.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  minio_data:
