services:
  postgres:
    image: postgres:16-alpine
    container_name: verdin-postgres
    environment:
      POSTGRES_USER: verdin
      POSTGRES_PASSWORD: verdin
      POSTGRES_DB: verdin_credit
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U verdin -d verdin_credit']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: verdin-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: verdin-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: verdin-api
    environment:
      APP_ENV: development
      SECRET_KEY: dev-secret-key-change-in-production-32chars
      DATABASE_URL: postgresql+asyncpg://verdin:verdin@postgres:5432/verdin_credit
      DATABASE_URL_SYNC: postgresql://verdin:verdin@postgres:5432/verdin_credit
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000,http://localhost
    ports:
      - '8000:8000'
    volumes:
      - ./apps/api:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: verdin-worker
    environment:
      REDIS_URL: redis://redis:6379/0
      WORKER_QUEUE_NAME: verdin:jobs
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: production
    container_name: verdin-web
    ports:
      - '3000:80'
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    container_name: verdin-nginx
    ports:
      - '80:80'
    volumes:
      - ./infrastructure/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api
      - web

volumes:
  postgres_data:
  redis_data:
  minio_data:
