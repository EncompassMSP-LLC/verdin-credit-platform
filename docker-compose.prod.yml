# Production stack for a single VM / VPS pilot deployment.
# Requires: Docker Engine 24+, Docker Compose v2, `.env.production` from `.env.production.example`

services:
  postgres:
    image: postgres:16-alpine
    container_name: verdin-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: verdin-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: verdin-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: production
    container_name: verdin-api
    env_file: .env.production
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
      REDIS_URL: ${REDIS_URL}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      CORS_ORIGINS: ${CORS_ORIGINS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/ready')",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: verdin-worker
    env_file: .env.production
    environment:
      APP_ENV: ${APP_ENV:-production}
      REDIS_URL: ${REDIS_URL}
      WORKER_QUEUE_NAME: ${WORKER_QUEUE_NAME:-verdin:jobs}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      DOCUMENT_OCR_ENABLED: ${DOCUMENT_OCR_ENABLED:-true}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: production
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_ENABLE_AI: ${VITE_ENABLE_AI:-false}
        VITE_ENABLE_LLM: ${VITE_ENABLE_LLM:-false}
        VITE_ENABLE_IMPORTS: ${VITE_ENABLE_IMPORTS:-true}
        VITE_ENABLE_ENTERPRISE: ${VITE_ENABLE_ENTERPRISE:-false}
        VITE_ENABLE_CLIENT_PORTAL: ${VITE_ENABLE_CLIENT_PORTAL:-false}
        VITE_ENABLE_PORTAL_PUSH: ${VITE_ENABLE_PORTAL_PUSH:-false}
    container_name: verdin-web
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: verdin-nginx
    ports:
      - '${HTTP_PORT:-80}:80'
    volumes:
      - ./infrastructure/nginx/production.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost/api/v1/health']
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
