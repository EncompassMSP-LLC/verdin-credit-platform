[project]
name = "verdin-llm-gateway"
version = "0.1.0"
description = "LLM provider configuration and policy gates for Verdin platform"
requires-python = ">=3.13"
dependencies = [
    "pydantic>=2.10.3",
    "pydantic-settings>=2.7.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["verdin_llm_gateway"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
